
<input type="checkbox" id="toggle-palette-checkbox" aria-hidden="true" style="display: none;" />
<input type="checkbox" id="toggle-move-checkbox" aria-hidden="true" style="display: none;" />
<input type="checkbox" id="toggle-menu-checkbox" aria-hidden="true" style="display: none;" />

<header id="site-header">

	


	<h1><a href="/">{{ i18n "site.title" }}</a> </h1>


	<div id="header-tools">
		<!-- GRID -->
		<button class="btn-icon" id="grid-switcher" for="grid-switcher-checkbox" aria-hidden="true">{{ partial "icons/grid-pixel.svg" }}</button>

		<!-- PALETTE -->
		<label class="btn-icon" for="toggle-palette-checkbox" id="toggle-palette" aria-hidden="true">{{ partial "icons/palette.svg" }}</label>
		<ul id="palette-list" aria-hidden="true">
			<li><button id="color-1" data-color="var(--color-bg-1)"></button></li>
			<li><button id="color-2" data-color="var(--color-bg-2)"></button></li>
			<li><button id="color-3" data-color="var(--color-bg-3)"></button></li>
			<li><button id="color-4" data-color="var(--color-bg-4)"></button></li>
			<li><button id="color-5" data-color="var(--color-bg-5)"></button></li>
		</ul>

		<!-- MOVE -->
		<label class="btn-icon" for="toggle-move-checkbox" id="toggle-move" aria-hidden="true">{{ partial "icons/cursor-hand.svg" }}</label>


	</div>




		<div id="header-links">

		<button id="language-switcher">
			{{ if eq .Lang "fr" }}<a data-lang="en" href="/en">en</a>{{ end }}
			{{ if eq .Lang "en" }}<a data-lang="fr" href="/fr">fr</a>{{ end }}
		</button>


        <button id="instagram"><a href="https://www.instagram.com/wysiwygproject/" target="_blank">{{ partial "icons/instagram.svg" }}</a></button>

		
		<input type="checkbox" id="mail-checkbox" aria-hidden="true" style="display: none;" />
		<button id="toggle-contact"><label for="mail-checkbox">{{ partial "icons/contact.svg" }}</label></button>

		<div id="contact-mail"><p>clemence.imbert@hesge.ch</p></div>
	</div>

		<label id="toggle-menu" class="btn-icon" for="toggle-menu-checkbox" aria-label="Open menu">
		<span></span>
	</label>

		
</header>
